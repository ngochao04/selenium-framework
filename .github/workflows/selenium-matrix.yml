name: 🔀 Multi-Browser Matrix

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chrome, firefox]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🧪 Run Tests (${{ matrix.browser }})
        run: |
          mvn clean test \
            -DsuiteXmlFile=testng-smoke.xml \
            -Dbrowser=${{ matrix.browser }}
        env:
          APP_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}
          APP_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}

      - name: 📤 Upload - ${{ matrix.browser }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.browser }}
          path: |
            target/surefire-reports/
            target/screenshots/
            target/allure-results/
          retention-days: 7
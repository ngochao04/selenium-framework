# .github/workflows/selenium-ci.yml
name: 🧪 Selenium CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🧪 Run Smoke Tests (Chrome Headless)
        run: |
          mvn clean test \
            -DsuiteXmlFile=testng-smoke.xml \
            -Dbrowser=chrome
        env:
          APP_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}
          APP_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}

      - name: 📤 Upload artifacts khi fail
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-results
          path: |
            target/surefire-reports/
            target/screenshots/
          retention-days: 30
      - name: 🔒 Verify secrets masked
        run: |
          echo "Username=$APP_USERNAME"
          echo "Password=$APP_PASSWORD"
        env:
          APP_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}
          APP_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}